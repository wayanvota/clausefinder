services:
  - type: web
    name: clausefinder-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: DATABASE_URL
        sync: false
      - key: ECFR_HISTORY_LOOKBACK_DAYS
        value: "365"
      - key: ECFR_MAX_HISTORY_SNAPSHOTS
        value: "120"
      - key: ECFR_WRITE_JSON
        value: "false"

  - type: web
    name: wayan-clause-finder
    runtime: static
    rootDir: wayan.com/clause-finder
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false
